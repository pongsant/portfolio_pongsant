<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Graphic Design</title>
    <meta name="description" content="Graphic Design category page.">
    <link rel="stylesheet" href="../styles.css">
    <script src="../script.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <a class="site-header__brand" href="../">PORTFOLIO</a>
      <nav class="site-nav" aria-label="Primary">
        <a href="../">HOME</a>
        <a href="../my-work/" aria-current="page">MY WORK</a>
        <a href="../about/">ABOUT</a>
      </nav>
    </header>

    <main class="page-main page-main--photo-poster">
      <section class="photo-poster photo-poster--graphic" aria-labelledby="graphic-design-title">
        <div class="photo-poster__top">
          <a class="page-back" href="../my-work/">Back to My Work</a>

          <div class="photo-poster__strip" id="projects" aria-label="Graphic design projects">
            <a class="photo-poster__item" href="./POTRAIT-OF-THE-SELFLESS-SELF/">
              <div class="photo-poster__item-media">

              </div>

            <a class="photo-poster__item" href="./poster-system/">
              <div class="photo-poster__item-media photo-poster__item-media--placeholder">
                <span>Poster System</span>
              </div>
              <div class="photo-poster__item-meta">
                <p class="photo-poster__item-index">02</p>
                <p class="photo-poster__item-label">Poster</p>
              </div>
            </a>
          </div>
        </div>

        <div class="photo-poster__hero">
          <h1 class="photo-poster__title photo-poster__title--graphic" id="graphic-design-title">GRAPHIC DESIGN</h1>
        </div>
