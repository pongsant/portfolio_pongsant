<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Work</title>
    <meta
      name="description"
      content="Selected work categories from the portfolio."
    >
    <link rel="stylesheet" href="../styles.css">
    <script src="../script.js" defer></script>
  </head>
  <body class="page-my-work">
    <header class="site-header">
      <a class="site-header__brand" href="../">PORTFOLIO</a>
      <nav class="site-nav" aria-label="Primary">
        <a href="../">HOME</a>
        <a href="./" aria-current="page">MY WORK</a>
        <a href="../about/">ABOUT</a>
      </nav>
    </header>

    <main class="work-hub">
      <section class="work-hub__scene" aria-label="Interactive work categories">
        <canvas class="work-hub__canvas" id="my-work-canvas" aria-hidden="true"></canvas>

        <div class="work-hub__center">
          <button
            class="work-hub__trigger"
            id="my-work-trigger"
            type="button"
            aria-expanded="false"
            aria-controls="work-options"
          >
            MY WORK
          </button>
          <p class="work-hub__hint"></p>
        </div>

        <nav class="work-hub__options" id="work-options" aria-label="Work categories">
          <a
            class="work-hub__option"
            href="../graphic-design/"
            data-offset-x="-320"
            data-offset-y="-170"
            data-offset-x-mobile="-108"
            data-offset-y-mobile="-162"
          >
            Graphic Design
          </a>
          <a
            class="work-hub__option"
            href="../photo/"
            data-offset-x="320"
            data-offset-y="-170"
            data-offset-x-mobile="108"
            data-offset-y-mobile="-162"
          >
            Photo
          </a>
          <a
            class="work-hub__option"
            href="../interactive-work/"
            data-offset-x="360"
            data-offset-y="26"
            data-offset-x-mobile="116"
            data-offset-y-mobile="-6"
          >
            Interactive Work
          </a>
          <a
            class="work-hub__option"
            href="../product-design/"
            data-offset-x="-296"
            data-offset-y="172"
            data-offset-x-mobile="-112"
            data-offset-y-mobile="124"
          >
            Product Design
          </a>
          <a
            class="work-hub__option"
            href="../drawing/"
            data-offset-x="0"
            data-offset-y="252"
            data-offset-x-mobile="0"
            data-offset-y-mobile="198"
          >
            Drawing
          </a>
        </nav>
      </section>
    </main>
  </body>
</html>
