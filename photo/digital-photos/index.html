<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Digital Photos</title>
    <meta name="description" content="Digital photo gallery.">
    <link rel="stylesheet" href="../../styles.css">
    <script src="../../script.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <a class="site-header__brand" href="../../">PORTFOLIO</a>
      <nav class="site-nav" aria-label="Primary">
        <a href="../../">HOME</a>
        <a href="../../my-work/" aria-current="page">MY WORK</a>
        <a href="../../about/">ABOUT</a>
      </nav>
    </header>

    <main class="page-main">
      <section class="page-shell page-shell--wide" aria-labelledby="digital-photos-title">
        <a class="page-back" href="../">Back to Photo</a>
        <h1 class="page-heading" id="digital-photos-title">DIGITAL PHOTOS</h1>
        <p class="page-subtitle">Click any image to expand it full size.</p>

        <div class="photo-gallery" data-photo-gallery>
          <button class="photo-gallery__item" type="button" data-photo-trigger data-photo-full="./IMG_1252.JPG" data-photo-title="Digital Photo 01">
            <img class="photo-gallery__image" src="./IMG_1252.JPG" alt="Digital Photo 01" loading="lazy">
          </button>
          <button class="photo-gallery__item" type="button" data-photo-trigger data-photo-full="./IMG_1253.JPG" data-photo-title="Digital Photo 02">
            <img class="photo-gallery__image" src="./IMG_1253.JPG" alt="Digital Photo 02" loading="lazy">
          </button>
          <button class="photo-gallery__item" type="button" data-photo-trigger data-photo-full="./IMG_1256.JPG" data-photo-title="Digital Photo 03">
            <img class="photo-gallery__image" src="./IMG_1256.JPG" alt="Digital Photo 03" loading="lazy">
          </button>
          <button class="photo-gallery__item" type="button" data-photo-trigger data-photo-full="./IMG_1259.JPG" data-photo-title="Digital Photo 04">
            <img class="photo-gallery__image" src="./IMG_1259.JPG" alt="Digital Photo 04" loading="lazy">
          </button>
          <button class="photo-gallery__item" type="button" data-photo-trigger data-photo-full="./IMG_1260.JPG" data-photo-title="Digital Photo 05">
            <img class="photo-gallery__image" src="./IMG_1260.JPG" alt="Digital Photo 05" loading="lazy">
          </button>
          <button class="photo-gallery__item" type="button" data-photo-trigger data-photo-full="./IMG_1261.JPG" data-photo-title="Digital Photo 06">
            <img class="photo-gallery__image" src="./IMG_1261.JPG" alt="Digital Photo 06" loading="lazy">
          </button>
          <button class="photo-gallery__item" type="button" data-photo-trigger data-photo-full="./IMG_1264.JPG" data-photo-title="Digital Photo 07">
            <img class="photo-gallery__image" src="./IMG_1264.JPG" alt="Digital Photo 07" loading="lazy">
          </button>
          <button class="photo-gallery__item" type="button" data-photo-trigger data-photo-full="./IMG_1889.JPG" data-photo-title="Digital Photo 08">
            <img class="photo-gallery__image" src="./IMG_1889.JPG" alt="Digital Photo 08" loading="lazy">
          </button>
        </div>
      </section>
    </main>

    <dialog class="photo-lightbox" data-photo-lightbox aria-label="Expanded photo">
      <div class="photo-lightbox__surface">
        <button class="photo-lightbox__close" type="button" data-photo-lightbox-close aria-label="Close expanded photo">
          Close
        </button>
        <img class="photo-lightbox__image" data-photo-lightbox-image alt="">
        <p class="photo-lightbox__caption" data-photo-lightbox-caption></p>
      </div>
    </dialog>
  </body>
</html>
