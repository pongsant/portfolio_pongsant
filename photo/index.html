<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Photo</title>
    <meta name="description" content="Photo category page.">
    <link rel="stylesheet" href="../styles.css">
    <script src="../script.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <a class="site-header__brand" href="../">PORTFOLIO</a>
      <nav class="site-nav" aria-label="Primary">
        <a href="../">HOME</a>
        <a href="../my-work/" aria-current="page">MY WORK</a>
        <a href="../about/">ABOUT</a>
      </nav>
    </header>

    <main class="page-main page-main--photo-poster">
      <section class="photo-poster" aria-labelledby="photo-title">
        <div class="photo-poster__top">
          <a class="page-back" href="../my-work/">Back to My Work</a>

          <div class="photo-poster__strip" id="collections" aria-label="Photo collections">
            <a class="photo-poster__item" href="./film-photos/">
              <div class="photo-poster__item-media">
                <img src="./film-photos/IMG_2039.JPG" alt="Film photos preview" loading="lazy">
              </div>
              <div class="photo-poster__item-meta">
                <p class="photo-poster__item-index">01</p>
                <p class="photo-poster__item-label">Film</p>
              </div>
            </a>

            <a class="photo-poster__item" href="./digital-photos/">
              <div class="photo-poster__item-media">
                <img src="./digital-photos/IMG_1252.JPG" alt="Digital photos preview" loading="lazy">
              </div>
              <div class="photo-poster__item-meta">
                <p class="photo-poster__item-index">02</p>
                <p class="photo-poster__item-label">Digital</p>
              </div>
            </a>
          </div>
        </div>

        <div class="photo-poster__hero">
          <h1 class="photo-poster__title photo-poster__title--photo" id="photo-title">PHOTOS</h1>
        </div>
      </section>
    </main>
  </body>
</html>
