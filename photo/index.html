<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Photo</title>
    <meta name="description" content="Photo category page.">
    <link rel="stylesheet" href="../styles.css">
    <script src="../script.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <a class="site-header__brand" href="../">PORTFOLIO</a>
      <nav class="site-nav" aria-label="Primary">
        <a href="../">HOME</a>
        <a href="../my-work/" aria-current="page">MY WORK</a>
        <a href="../about/">ABOUT</a>
      </nav>
    </header>

    <main class="page-main">
      <section class="page-shell" aria-labelledby="photo-title">
        <a class="page-back" href="../my-work/">Back to My Work</a>
        <h1 class="page-heading" id="photo-title">PHOTO</h1>
        <p class="page-subtitle">Selected photography series and image collections.</p>

        <div class="photo-series">
          <a class="photo-series-card" href="./film-photos/">
            <div class="photo-series-card__media">
              <img
                src="./film-photos/L1000341.jpeg"
                alt="Film photos preview"
                loading="lazy"
              >
            </div>
            <div class="photo-series-card__body">
              <p class="catalog-card__index">01</p>
              <h2 class="catalog-card__title">FILM PHOTOS</h2>
              <p class="catalog-card__meta">
                11 frames collected in one series. Open the page to browse all images and click any frame to expand it full size.
              </p>
            </div>
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
