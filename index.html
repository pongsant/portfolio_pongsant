<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Portfolio</title>
    <meta
      name="description"
      content="A one-page portfolio landing page with a white point-cloud hero, a centered Portfolio title, and simple navigation."
    >
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Syne:wght@500;700;800&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <a class="site-header__brand" href="#top">PORTFOLIO</a>
      <nav class="site-nav" aria-label="Primary">
        <a href="#top">HOME</a>
        <a href="#my-work">MY WORK</a>
        <a href="#about">ABOUT</a>
      </nav>
    </header>

    <main>
      <section class="hero" id="top" aria-labelledby="hero-title">
        <canvas class="hero__canvas" id="particle-canvas" aria-hidden="true"></canvas>

        <div class="hero__content">
          <h1 class="hero__title" id="hero-title"></h1>
        </div>
      </section>

      <section class="content-section content-section--work" id="my-work" aria-labelledby="my-work-title">
        <div class="section-heading">
          <h2 id="my-work-title">MY WORK</h2>
        </div>
      </section>

      <section class="content-section content-section--about" id="about" aria-labelledby="about-title">
        <div class="section-heading">
          <h2 id="about-title">ABOUT</h2>
        </div>
      </section>
    </main>
  </body>
</html>
